<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Julieth">
    <meta name="copyright" content="fuentepropia">
    <title>Inicio</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<header>
    <div class="bg-indigo-400 p-4">
        <div class="flex items-center justify-between p-4 max-w-full">
            <div class="flex items-center flex-1 min-w-0">
                <h1 class="text-white text-lg sm:text-2xl font-semibold truncate">Seguimiento a tus Finanzas</h1>
            </div>
            
            <!-- Botón hamburguesa (visible solo en móvil) -->
            <button id="menuToggle" class="md:hidden flex items-center justify-center w-10 h-10 text-white hover:bg-indigo-600 rounded transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            
            <!-- Menú de navegación (visible en pantallas medianas+) -->
            <div class="hidden md:flex items-center gap-4 ml-4">
                <span id="usuarioInfo" class="text-white px-3 py-2 text-sm whitespace-nowrap"></span>
                <button class="text-white px-3 py-2 rounded hover:bg-indigo-600 transition-colors text-sm"><a href="./Inicio.html">Inicio</a></button>
                <button id="cerrarSesionBtn" class="text-white px-3 py-2 rounded hover:bg-indigo-600 transition-colors text-sm">Cerrar Sesion</button>
            </div>
        </div>
        
        <!-- Menú desplegable (solo en móvil) -->
        <div id="mobileMenu" class="hidden md:hidden bg-indigo-500 rounded-md mt-2 overflow-hidden">
            <div class="flex flex-col">
                <span id="usuarioInfoMobile" class="text-white px-4 py-3 text-sm border-b border-indigo-600"></span>
                <button class="text-white px-4 py-3 text-left hover:bg-indigo-600 transition-colors text-sm border-b border-indigo-600">
                    <a href="./Inicio.html">Inicio</a>
                </button>
                <button id="cerrarSesionBtnMobile" class="text-white px-4 py-3 text-left hover:bg-indigo-600 transition-colors text-sm">Cerrar Sesion</button>
            </div>
        </div>
    </div>
</header>
<body class="bg-gray-200">
    <div class="container p-10 m-auto">
        <h2 class="text-2xl mb-8 flex justify-center">Agregar Transacción</h2>
        <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 items-start">
            <!-- Botón en la izquierda (visible en pantallas grandes) -->
            <div class="hidden lg:flex w-full lg:w-1/4 flex-col justify-start sticky top-10">
                <button form="formAgregar" class="bg-indigo-400 w-full py-3 rounded hover:bg-indigo-600 transition-color font-semibold text-white text-lg" type="submit">Guardar</button>
            </div>
            
            <!-- Formulario en la derecha -->
            <div class="w-full lg:w-3/4">
                <form id="formAgregar" novalidate>
                    <div>
                        <label for="type" class="block text-sm font-semibold mb-2">Tipo</label>
                        <select type="text" name="tipo" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                            <option value="n/a">Seleccionar opción</option>
                            <option value="Ingreso">Ingreso</option>
                            <option value="Gasto">Gasto</option>
                        </select>
                        <label for="valor" class="block text-sm font-semibold mb-2">Valor (Sin comas ni puntos)</label>
                        <input type="number" name="valor" min="0" step="1" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                        <label for="categoria" class="block text-sm font-semibold mb-2">Categoría</label>
                        <select type="text" id="categoriaAdd" name="categoria" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                            <option value="n/a">Seleccionar opción</option>
                            <option value="Alimentación">Alimentación</option>
                            <option value="Gastos Hogar">Gastos Hogar</option>
                            <option value="Tecnologia y Electrodomesticos">Tecnologia y Electrodomesticos</option>
                            <option value="Otros">Otros</option>
                        </select>
                        <label for="fecha" class="block text-sm font-semibold mb-2">Fecha</label>
                        <input type="date" name="fecha" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                        <label for="descripcion" class="block text-sm font-semibold mb-2">Descripción (opcional)</label>
                        <textarea name="descripcion" class="flex w-full py-4 rounded-md bg-gray-100 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400"></textarea>
                        <!-- Botón visible solo en móvil -->
                        <button class="bg-indigo-400 w-full py-2 rounded hover:bg-indigo-600 transition-color mt-3 lg:hidden font-semibold" type="submit">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="mb-4 p-4 md:p-10 flex flex-col md:flex-row justify-center gap-4 md:gap-4">
            <select id="filtroCategoria" class="w-full md:w-auto px-3 py-2 rounded-md border border-gray-300 focus:outline-none focus:border-indigo-400">
                <option value="">Todas las categorías</option>
                <option value="Alimentación">Alimentación</option>
                <option value="Gastos Hogar">Gastos Hogar</option>
                <option value="Tecnologia y Electrodomesticos">Tecnologia y Electrodomesticos</option>
                <option value="Otros">Otros</option>
            </select>
            <select id="filtroTipo" class="w-full md:w-auto px-3 py-2 rounded-md border border-gray-300 focus:outline-none focus:border-indigo-400">
                <option value="">Todos los tipos</option>
                <option value="Ingreso">Ingreso</option>
                <option value="Gasto">Gasto</option>
            </select>
        </div>
        <div class="mt-10 m-auto">
            <h2 class="mb-4 flex justify-center">Lista de Transacciones</h2>
            <div class="tabladetransaccion overflow-x-auto">
                <table class="w-full bg-white">
                    <tr class="border-b-2 rounded border-indigo-500">
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Tipo</th>
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Fecha</th>
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Categoría</th>
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Valor</th>
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Descripción</th>
                        <th class="text-left py-2 px-3 bg-indigo-400 text-white whitespace-nowrap">Editar</th>
                    </tr>
                </table>
            </div>
        </div>
        <div id="modal" class="fixed top-0 left-0 w-full h-full bg-indigo-200 items-center justify-center hidden p-4">
            <div class="bg-gray-200 p-4 md:p-6 rounded w-full md:w-1/2 max-h-screen overflow-y-auto">
                <div class="flex justify-end mb-4">
                    <button id="closeModalButton" class="text-2xl font-bold text-gray-600 hover:text-gray-800">x</button>
                </div>
                <h2 class="text-2xl mb-4 flex justify-center font-semibold">Editar Transacción</h2>
                <form id="formEditar" novalidate>
                    <div>
                        <label for="tipoEdit" class="block text-sm font-semibold mb-2">Tipo</label>
                        <select type="text" id="tipoEdit" name="tipo" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                            <option value="n/a">Seleccionar opción</option>
                            <option value="Ingreso">Ingreso</option>
                            <option value="Gasto">Gasto</option>
                        </select>
                        <label for="valorEdit" class="block text-sm font-semibold mb-2">Valor (Sin comas ni puntos)</label>
                        <input type="number" id="valorEdit" name="valor" min="0" step="1" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                        <label for="categoriaEdit" class="block text-sm font-semibold mb-2">Categoría</label>
                        <select type="text" id="categoriaEdit" name="categoria" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                            <option value="n/a">Seleccionar opción</option>
                            <option value="Alimentación">Alimentación</option>
                            <option value="Gastos Hogar">Gastos Hogar</option>
                            <option value="Tecnologia y Electrodomesticos">Tecnologia y Electrodomesticos</option>
                            <option value="Otros">Otros</option>
                        </select>
                        <label for="fechaEdit" class="block text-sm font-semibold mb-2">Fecha</label>
                        <input type="date" id="fechaEdit" name="fecha" class="flex w-full py-2 rounded-md mb-4 text-gray-500 border border-gray-300 focus:outline-none focus:border-indigo-400" required>
                        <label for="descripcionEdit" class="block text-sm font-semibold mb-2">Descripción (opcional)</label>
                        <textarea id="descripcionEdit" name="descripcion" class="flex w-full py-4 rounded-md border border-gray-300 focus:outline-none focus:border-indigo-400"></textarea>
                        <button class="bg-indigo-400 w-full py-2 rounded hover:bg-indigo-600 transition-color mt-4 font-semibold text-white" type="submit">Actualizar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="./auth.js"></script>
    <script src="./script.js"></script>
</body>
<footer>
    <div class="bg-indigo-400 p-4 flex items-center justify-center">
        <h1 class="text-white p-4">Copyright © 2024 Julieth Ochoa</h1>
    </div>
</footer>
</html>
